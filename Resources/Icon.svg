<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Radiation symbol</title>
<desc>Radiation hazard symbol, high contrast yellow on dark</desc>

<defs>
  <clipPath id="oc"><circle cx="340" cy="340" r="300"/></clipPath>
  <radialGradient id="bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a1a00"/>
    <stop offset="100%" stop-color="#000000"/>
  </radialGradient>
</defs>

<!-- Outer rim -->
<circle cx="340" cy="340" r="330" fill="#111100"/>
<circle cx="340" cy="340" r="320" fill="#0a0a00" stroke="#ffe000" stroke-width="3"/>
<circle cx="340" cy="340" r="308" fill="none" stroke="#998800" stroke-width="1"/>

<!-- Tick marks -->
<g stroke="#ffe000" stroke-width="2" stroke-linecap="round">
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(0 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(15 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(30 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(45 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(60 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(75 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(90 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(105 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(120 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(135 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(150 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(165 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(180 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(195 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(210 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(225 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(240 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(255 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(270 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(285 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(300 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(315 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(330 340 340)"/>
  <line x1="340" y1="22" x2="340" y2="36" transform="rotate(345 340 340)"/>
</g>

<!-- Blade 1: top (240°→300°) -->
<path d="
  M 296,263.8
  A 88,88 0 0,1 384,263.8
  L 469,116.6
  A 258,258 0 0,0 211,116.6
  Z" fill="#ffe000" stroke="#ffcc00" stroke-width="1.5"/>

<!-- Blade 2: lower-right (0°→60°) -->
<path d="
  M 428,340
  A 88,88 0 0,1 384,416.2
  L 469,563.4
  A 258,258 0 0,0 598,340
  Z" fill="#ffe000" stroke="#ffcc00" stroke-width="1.5"/>

<!-- Blade 3: lower-left (120°→180°) -->
<path d="
  M 296,416.2
  A 88,88 0 0,1 252,340
  L 82,340
  A 258,258 0 0,0 211,563.4
  Z" fill="#ffe000" stroke="#ffcc00" stroke-width="1.5"/>

<!-- Inner gap circle (covers blade roots) -->
<circle cx="340" cy="340" r="88" fill="#0a0a00"/>

<!-- Center dot -->
<circle cx="340" cy="340" r="44" fill="#ffe000" stroke="#ffcc00" stroke-width="1.5"/>
<circle cx="340" cy="340" r="26" fill="#0a0a00"/>

<!-- Accent rings -->
<circle cx="340" cy="340" r="288" fill="none" stroke="#ffe000" stroke-width="1.5"/>
<circle cx="340" cy="340" r="275" fill="none" stroke="#665500" stroke-width="0.5"/>
</svg>
